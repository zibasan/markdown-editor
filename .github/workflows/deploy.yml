name: Deploy static content to Pages

on:
  push:
    branches: ['master'] # デフォルトブランチがmasterの場合は 'master' に変更してください

# GITHUB_TOKENの権限を設定
permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # 1. pnpmをセットアップする（setup-nodeの「前」に追加します）
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10 # お使いのpnpmのバージョンに合わせて変更してください（8や9など）

      # 2. Node.jsのセットアップで、キャッシュに 'pnpm' を指定する
      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: 'pnpm'

      # 3. 依存関係のインストールを pnpm に変更
      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # 4. ビルドコマンドを pnpm に変更
      - name: Build
        run: pnpm run build:web

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
